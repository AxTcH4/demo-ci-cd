name: Security Pipeline – CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  sast:
    name: "SAST – Semgrep"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Semgrep
        run: pip install semgrep

      - name: Lancer Semgrep (SAST)
        run: |
          semgrep \
            --config=p/python \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --error \
            --json \
            --output semgrep-results.json \
            app/

      - name: Afficher le rapport SAST
        if: always()
        run: |
          echo "===== RAPPORT SEMGREP ====="
          cat semgrep-results.json | grep -o '"message":"[^"]*"' | head -20

      - name: Upload rapport SAST
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: semgrep-results.json

  sca:
    name: "SCA – Snyk"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Lancer Snyk (SCA)
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high --json > snyk-results.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Afficher les CVE trouvées
        if: always()
        run: |
          echo "===== RAPPORT SCA ====="
          if [ -f snyk-results.json ]; then
            echo "Vulnérabilités trouvées :"
            cat snyk-results.json | grep -o '"title":"[^"]*"' | sed 's/"title":"//;s/"//'
            cat snyk-results.json | grep -o '"severity":"[^"]*"' | sed 's/"severity":"//;s/"//'
          else
            echo "Rapport non généré"
          fi

      - name: Upload rapport SCA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-report
          path: snyk-results.json

  build:
    name: "Build & Test"
    runs-on: ubuntu-latest
    needs: [sast, sca]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: echo "Tests OK"

  dast:
    name: "DAST – OWASP ZAP"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Démarrer l'application Flask
        run: |
          pip install flask==0.12.2
          python app/app.py &
          sleep 5

      - name: Lancer OWASP ZAP (DAST)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          fail_action: true

      - name: Upload rapport DAST
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: report_html.html